<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta de CEP</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      width: 100%;
      max-width: 600px;
      animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 1.8rem;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    header p {
      color: #666;
      font-size: 0.95rem;
    }

    .form-row {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
    }

    .form-group {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .form-group.flex-1 { flex: 1; }
    .form-group.flex-2 { flex: 2; }
    .form-group.flex-3 { flex: 3; }

    label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      color: #333;
      transition: border-color 0.3s, box-shadow 0.3s, background-color 0.3s;
      outline: none;
      background: #fff;
    }

    input:focus {
      border-color: #2c5364;
      box-shadow: 0 0 0 3px rgba(44, 83, 100, 0.15);
    }

    input[readonly] {
      background: #f5f5f5;
      color: #555;
      cursor: default;
    }

    input[readonly]:focus {
      border-color: #e0e0e0;
      box-shadow: none;
    }

    input.filled {
      background: #eafff3;
      border-color: #2ecc71;
    }

    input::placeholder {
      color: #bbb;
    }

    .cep-group {
      max-width: 220px;
    }

    .cep-input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .cep-input-wrapper input {
      width: 100%;
      padding-right: 44px;
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .spinner {
      position: absolute;
      right: 14px;
      width: 20px;
      height: 20px;
      border: 3px solid #e0e0e0;
      border-top-color: #2c5364;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status-icon {
      position: absolute;
      right: 14px;
      font-size: 1.2rem;
      font-weight: bold;
    }

    .status-icon.success { color: #2ecc71; }
    .status-icon.error { color: #e74c3c; }

    .error-message {
      font-size: 0.8rem;
      color: #e74c3c;
      margin-top: 4px;
      min-height: 18px;
    }

    .hidden {
      display: none !important;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #203a43, #2c5364);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 8px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(44, 83, 100, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .result-card {
      margin-top: 24px;
      padding: 20px;
      background: linear-gradient(135deg, #eafff3, #d4f5e9);
      border: 2px solid #2ecc71;
      border-radius: 12px;
      animation: slideUp 0.4s ease-out;
    }

    .result-card h2 {
      font-size: 1.1rem;
      color: #27ae60;
      margin-bottom: 8px;
    }

    .result-card p {
      color: #333;
      line-height: 1.6;
    }

    @media (max-width: 500px) {
      .container {
        padding: 24px 20px;
      }

      header h1 {
        font-size: 1.4rem;
      }

      .form-row {
        flex-direction: column;
        gap: 12px;
      }

      .cep-group {
        max-width: 100%;
      }

      .form-group.flex-1,
      .form-group.flex-2,
      .form-group.flex-3 {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Consulta de CEP</h1>
      <p>Digite o CEP para preencher o endereço automaticamente</p>
    </header>

    <form id="address-form" autocomplete="off">
      <div class="form-row">
        <div class="form-group cep-group">
          <label for="cep">CEP</label>
          <div class="cep-input-wrapper">
            <input
              type="text"
              id="cep"
              name="cep"
              placeholder="00000-000"
              maxlength="9"
              inputmode="numeric"
              required
            >
            <div id="cep-spinner" class="spinner hidden"></div>
            <span id="cep-status" class="status-icon hidden"></span>
          </div>
          <span id="cep-error" class="error-message hidden"></span>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group flex-3">
          <label for="logradouro">Logradouro</label>
          <input type="text" id="logradouro" name="logradouro" placeholder="Rua, Avenida, etc." readonly>
        </div>
        <div class="form-group flex-1">
          <label for="numero">Número</label>
          <input type="text" id="numero" name="numero" placeholder="Nº" inputmode="numeric">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="complemento">Complemento</label>
          <input type="text" id="complemento" name="complemento" placeholder="Apto, Bloco, Sala...">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group flex-2">
          <label for="bairro">Bairro</label>
          <input type="text" id="bairro" name="bairro" placeholder="Bairro" readonly>
        </div>
        <div class="form-group flex-2">
          <label for="cidade">Cidade</label>
          <input type="text" id="cidade" name="cidade" placeholder="Cidade" readonly>
        </div>
        <div class="form-group flex-1">
          <label for="estado">UF</label>
          <input type="text" id="estado" name="estado" placeholder="UF" maxlength="2" readonly>
        </div>
      </div>

      <button type="submit" id="btn-submit">Confirmar Endereço</button>
    </form>

    <div id="result-card" class="result-card hidden">
      <h2>Endereço Confirmado</h2>
      <p id="result-text"></p>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const cepInput = document.getElementById('cep');
      const spinner = document.getElementById('cep-spinner');
      const statusIcon = document.getElementById('cep-status');
      const errorMessage = document.getElementById('cep-error');
      const form = document.getElementById('address-form');
      const resultCard = document.getElementById('result-card');
      const resultText = document.getElementById('result-text');

      const addressFields = {
        logradouro: document.getElementById('logradouro'),
        bairro: document.getElementById('bairro'),
        cidade: document.getElementById('cidade'),
        estado: document.getElementById('estado'),
      };

      // Máscara de CEP: 99999-999
      cepInput.addEventListener('input', (e) => {
        let value = e.target.value.replace(/\D/g, '');
        if (value.length > 5) {
          value = value.slice(0, 5) + '-' + value.slice(5, 8);
        }
        e.target.value = value;

        hideStatus();
        hideError();

        if (value.replace('-', '').length === 8) {
          fetchCep(value.replace('-', ''));
        }
      });

      // Permitir colar CEPs
      cepInput.addEventListener('paste', () => {
        setTimeout(() => {
          cepInput.dispatchEvent(new Event('input'));
        }, 10);
      });

      async function fetchCep(cep) {
        showSpinner();
        clearFields();

        try {
          const response = await fetch('https://viacep.com.br/ws/' + cep + '/json/');

          if (!response.ok) {
            throw new Error('Erro na conexão');
          }

          const data = await response.json();

          if (data.erro) {
            showError('CEP não encontrado. Verifique e tente novamente.');
            showStatusIcon('error');
            return;
          }

          fillFields(data);
          showStatusIcon('success');

          // Foca no campo número após preencher
          document.getElementById('numero').focus();

        } catch (err) {
          showError('Não foi possível consultar o CEP. Verifique sua conexão.');
          showStatusIcon('error');
        } finally {
          hideSpinner();
        }
      }

      function fillFields(data) {
        addressFields.logradouro.value = data.logradouro || '';
        addressFields.bairro.value = data.bairro || '';
        addressFields.cidade.value = data.localidade || '';
        addressFields.estado.value = data.uf || '';

        // Adiciona classe visual de preenchido
        Object.values(addressFields).forEach((field) => {
          if (field.value) {
            field.classList.add('filled');
          }
        });

        // Se logradouro veio vazio, libera para edição
        if (!data.logradouro) {
          addressFields.logradouro.removeAttribute('readonly');
          addressFields.logradouro.focus();
        }

        // Se bairro veio vazio, libera para edição
        if (!data.bairro) {
          addressFields.bairro.removeAttribute('readonly');
        }
      }

      function clearFields() {
        Object.values(addressFields).forEach((field) => {
          field.value = '';
          field.classList.remove('filled');
          if (field.id !== 'numero' && field.id !== 'complemento') {
            field.setAttribute('readonly', true);
          }
        });
        resultCard.classList.add('hidden');
      }

      function showSpinner() {
        spinner.classList.remove('hidden');
        statusIcon.classList.add('hidden');
      }

      function hideSpinner() {
        spinner.classList.add('hidden');
      }

      function showStatusIcon(type) {
        statusIcon.classList.remove('hidden', 'success', 'error');
        if (type === 'success') {
          statusIcon.textContent = '\u2714';
          statusIcon.classList.add('success');
        } else {
          statusIcon.textContent = '\u2718';
          statusIcon.classList.add('error');
        }
      }

      function hideStatus() {
        statusIcon.classList.add('hidden');
      }

      function showError(msg) {
        errorMessage.textContent = msg;
        errorMessage.classList.remove('hidden');
      }

      function hideError() {
        errorMessage.textContent = '';
        errorMessage.classList.add('hidden');
      }

      // Submit do formulário
      form.addEventListener('submit', (e) => {
        e.preventDefault();

        const cep = cepInput.value.trim();
        const logradouro = addressFields.logradouro.value.trim();
        const numero = document.getElementById('numero').value.trim();
        const complemento = document.getElementById('complemento').value.trim();
        const bairro = addressFields.bairro.value.trim();
        const cidade = addressFields.cidade.value.trim();
        const estado = addressFields.estado.value.trim();

        if (!cep || !logradouro || !cidade || !estado) {
          showError('Preencha o CEP e aguarde o carregamento do endereço.');
          return;
        }

        const parts = [logradouro];
        if (numero) parts.push(numero);
        if (complemento) parts.push(complemento);
        parts.push(bairro);
        parts.push(cidade + ' - ' + estado);
        parts.push('CEP: ' + cep);

        resultText.textContent = parts.join(', ');
        resultCard.classList.remove('hidden');

        resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      });
    });
  </script>
</body>
</html>
