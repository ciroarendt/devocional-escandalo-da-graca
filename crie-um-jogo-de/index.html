<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Enduro</title>
<style>
*{margin:0;padding:0}
html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:none;-webkit-user-select:none;user-select:none}
canvas{display:block;width:100vw;height:100vh;object-fit:contain;image-rendering:pixelated}
</style>
</head>
<body>
<canvas id="c" width="320" height="480"></canvas>
<script>
var c=document.getElementById("c"),x=c.getContext("2d"),W=320,H=480;
// Audio
var ac=null;
function ia(){if(!ac){try{ac=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}if(ac&&ac.state==="suspended")ac.resume()}
function pt(f,d,t,v){if(!ac)return;try{var o=ac.createOscillator(),g=ac.createGain();o.type=t||"square";o.frequency.value=f;g.gain.value=v||.08;g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d)}catch(e){}}
function sEng(s){pt(40+s*.6,.08,"sawtooth",.04)}
function sCol(){pt(80,.3,"sawtooth",.15);setTimeout(function(){pt(50,.2,"square",.1)},100)}
function sPass(){pt(600,.08,"square",.06);setTimeout(function(){pt(800,.08,"square",.06)},80)}
function sDayC(){[523,659,784,1047].forEach(function(n,i){setTimeout(function(){pt(n,.2,"square",.1)},i*150)})}
function sGO(){[400,350,300,250].forEach(function(n,i){setTimeout(function(){pt(n,.3,"square",.1)},i*200)})}

// Palettes
var P={
day:{s:["#4a90d9","#6ba3e0","#8cb8e8"],r:"#555",rl:"#666",st:"#ccc",g:["#4a8c3f","#3d7a34"],m:"#5a7a4a",ms:"#ddeedd",c:["#e74c3c","#f39c12","#2ecc71","#3498db","#9b59b6","#e67e22"],t:"#fff"},
sun:{s:["#e8734a","#d4553a","#b8382e"],r:"#444",rl:"#555",st:"#a98",g:["#6b5a30","#5a4a28"],m:"#4a3a2a",ms:"#c97",c:["#f64","#fa3","#4b6","#48c","#a5c","#f84"],t:"#fdc"},
nit:{s:["#0a0a2e","#0d0d3a","#111146"],r:"#222",rl:"#2a2a2a",st:"#555",g:["#0a1a0a","#081408"],m:"#112",ms:"#224",c:["#f44","#fc2","#4f6","#49f","#c6f","#f84"],t:"#88c"},
dwn:{s:["#2a2a6e","#4a3a7e","#7a5a8e"],r:"#3a3a3a",rl:"#444",st:"#887",g:["#2a3a20","#223018"],m:"#2a2a3a",ms:"#6a6a8a",c:["#e54","#eb3","#3c5","#38b","#95b","#e73"],t:"#cbd"},
snw:{s:["#c8d8e8","#b8c8d8","#a8b8c8"],r:"#889",rl:"#99a",st:"#fff",g:["#def","#cde"],m:"#9ab",ms:"#fff",c:["#c33","#d92","#2a4","#27a","#84a","#d62"],t:"#345"},
fog:{s:["#aaa","#999","#888"],r:"#777",rl:"#808080",st:"#bbb",g:["#9a8","#897"],m:"#999",ms:"#aaa",c:["#c44","#ca3","#4a5","#48a","#85a","#c73"],t:"#ddd"}
};

// State
var ST=0,day=1,goal=200,passed=0,spd=0,mxSpd=180,plX=0,scroll=0,sc=0;
var dTmr=0,dDur=60,pPh=0,pLrp=0,ens=[],colT=0,esTmr=0,tBl=0;
var dcT=0,goT=0,snPrt=[],fogA=0,isSn=false,isFg=false,fc=0;

// Input
var tL=false,tR=false,tB=false,kL=false,kR=false,kB=false;

// Road
var SL=5,RW=1200,LANES=4,DD=80;
var CH=800,CD=1/Math.tan(40*Math.PI/180);

// Mountains
var mp=[];
for(var i=0;i<=64;i++){var v=i/64;mp.push(Math.sin(v*Math.PI)*.6+Math.sin(v*Math.PI*3)*.15+Math.sin(v*Math.PI*7+1)*.08)}

function lr(a,b,t){return a+(b-a)*t}
function lc(a,b,t){
if(!a||!b||a.length<4||b.length<4)return a||"#000";
var r1,g1,b1,r2,g2,b2;
if(a.length===4){r1=parseInt(a[1]+a[1],16);g1=parseInt(a[2]+a[2],16);b1=parseInt(a[3]+a[3],16)}
else{r1=parseInt(a.slice(1,3),16);g1=parseInt(a.slice(3,5),16);b1=parseInt(a.slice(5,7),16)}
if(b.length===4){r2=parseInt(b[1]+b[1],16);g2=parseInt(b[2]+b[2],16);b2=parseInt(b[3]+b[3],16)}
else{r2=parseInt(b.slice(1,3),16);g2=parseInt(b.slice(3,5),16);b2=parseInt(b.slice(5,7),16)}
if(isNaN(r1)||isNaN(r2))return a;
var r=Math.round(lr(r1,r2,t)),g=Math.round(lr(g1,g2,t)),bl=Math.round(lr(b1,b2,t));
return"#"+((1<<24)+(r<<16)+(g<<8)+bl).toString(16).slice(1)
}

function gP(){
var ph=["day","sun","nit","dwn"];
var wp=isSn?["snw","snw","snw","snw"]:isFg?["fog","fog","fog","fog"]:null;
var ck=wp?wp[pPh]:ph[pPh],nk=wp?wp[(pPh+1)%4]:ph[(pPh+1)%4];
var a=P[ck],b=P[nk],t=pLrp;
return{s:[lc(a.s[0],b.s[0],t),lc(a.s[1],b.s[1],t),lc(a.s[2],b.s[2],t)],r:lc(a.r,b.r,t),rl:lc(a.rl,b.rl,t),st:lc(a.st,b.st,t),g:[lc(a.g[0],b.g[0],t),lc(a.g[1],b.g[1],t)],m:lc(a.m,b.m,t),ms:lc(a.ms,b.ms,t),c:[lc(a.c[0],b.c[0],t),lc(a.c[1],b.c[1],t),lc(a.c[2],b.c[2],t),lc(a.c[3],b.c[3],t),lc(a.c[4],b.c[4],t),lc(a.c[5],b.c[5],t)],t:lc(a.t,b.t,t)}
}

function proj(z){var s=CD/z;return{x:W/2,y:H*.45-s*CH*H*.4,w:s*RW*W*.3,s:s}}

function spwn(){
var ln=Math.floor(Math.random()*LANES)-LANES/2+.5;
ens.push({z:DD*SL,x:(ln/(LANES/2))*.7,ci:Math.floor(Math.random()*6),sp:40+Math.random()*60,pd:false})
}

function dPC(px,py,w){
var cw=w*.18,ch=cw*1.5;
x.fillStyle="rgba(0,0,0,.3)";x.fillRect(px-cw*.6,py+ch*.1,cw*1.2,ch*.15);
x.fillStyle="#e8e8e8";x.fillRect(px-cw*.4,py-ch*.7,cw*.8,ch*.95);
x.fillStyle="#248";x.fillRect(px-cw*.3,py-ch*.6,cw*.6,ch*.25);
x.fillStyle="#ccc";x.fillRect(px-cw*.35,py-ch*.3,cw*.7,ch*.35);
x.fillStyle="#c33";x.fillRect(px-cw*.45,py-ch*.5,cw*.08,ch*.7);x.fillRect(px+cw*.37,py-ch*.5,cw*.08,ch*.7);
x.fillStyle="#f22";x.fillRect(px-cw*.35,py+ch*.05,cw*.15,ch*.08);x.fillRect(px+cw*.2,py+ch*.05,cw*.15,ch*.08);
x.fillStyle="#111";x.fillRect(px-cw*.5,py-ch*.45,cw*.12,ch*.25);x.fillRect(px+cw*.38,py-ch*.45,cw*.12,ch*.25);
x.fillRect(px-cw*.5,py-ch*.05,cw*.12,ch*.2);x.fillRect(px+cw*.38,py-ch*.05,cw*.12,ch*.2)
}

function dEC(ex,ey,ew,ci,p){
var cw=ew,ch=cw*1.4,co=p.c[ci%6];
x.fillStyle="rgba(0,0,0,.3)";x.fillRect(ex-cw*.6,ey+ch*.05,cw*1.2,ch*.12);
x.fillStyle=co;x.fillRect(ex-cw*.4,ey-ch*.7,cw*.8,ch*.95);
x.fillStyle="#123";x.fillRect(ex-cw*.25,ey-ch*.55,cw*.5,ch*.2);
x.fillStyle=lc(co,"#fff",.3);x.fillRect(ex-cw*.3,ey-ch*.65,cw*.6,ch*.12);
var nt=pPh===2||(pPh===1&&pLrp>.5);
if(nt){x.fillStyle="#f44";x.shadowColor="#f00";x.shadowBlur=cw*.5}else{x.fillStyle="#c22";x.shadowBlur=0}
x.fillRect(ex-cw*.38,ey+ch*.05,cw*.15,ch*.08);x.fillRect(ex+cw*.23,ey+ch*.05,cw*.15,ch*.08);
x.shadowBlur=0;
x.fillStyle="#111";x.fillRect(ex-cw*.5,ey-ch*.4,cw*.12,ch*.2);x.fillRect(ex+cw*.38,ey-ch*.4,cw*.12,ch*.2)
}

function iSn(){snPrt=[];for(var i=0;i<80;i++)snPrt.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.5,vy:1+Math.random()*2,sz:1+Math.random()*2})}
function uSn(){for(var i=0;i<snPrt.length;i++){var p=snPrt[i];p.x+=p.vx+Math.sin(fc*.02+p.y*.01)*.3;p.y+=p.vy;if(p.y>H){p.y=-5;p.x=Math.random()*W}if(p.x<0)p.x=W;if(p.x>W)p.x=0}}
function dSn(){x.fillStyle="rgba(255,255,255,.8)";for(var i=0;i<snPrt.length;i++){var p=snPrt[i];x.fillRect(p.x|0,p.y|0,p.sz,p.sz)}}

// Touch
function gtp(t){var r=c.getBoundingClientRect();return{x:(t.clientX-r.left)/r.width*W,y:(t.clientY-r.top)/r.height*H}}

c.addEventListener("touchstart",function(e){
e.preventDefault();ia();
if(ST===0){strt();return}
if(ST===3){if(goT>2)rst();return}
if(ST===2)return;
for(var i=0;i<e.changedTouches.length;i++){var p=gtp(e.changedTouches[i]);if(p.y>H*.82)tB=true;else if(p.x<W*.5)tL=true;else tR=true}
},{passive:false});

c.addEventListener("touchend",function(e){
e.preventDefault();tL=false;tR=false;tB=false;
for(var i=0;i<e.touches.length;i++){var p=gtp(e.touches[i]);if(p.y>H*.82)tB=true;else if(p.x<W*.5)tL=true;else tR=true}
},{passive:false});

c.addEventListener("touchmove",function(e){e.preventDefault()},{passive:false});
c.addEventListener("mousedown",function(e){ia();if(ST===0)strt();else if(ST===3&&goT>2)rst()});

document.addEventListener("keydown",function(e){
ia();
if(e.key==="ArrowLeft"||e.key==="a")kL=true;
if(e.key==="ArrowRight"||e.key==="d")kR=true;
if(e.key==="ArrowDown"||e.key==="s")kB=true;
if(e.key===" "||e.key==="Enter"){if(ST===0)strt();if(ST===3&&goT>2)rst()}
});
document.addEventListener("keyup",function(e){
if(e.key==="ArrowLeft"||e.key==="a")kL=false;
if(e.key==="ArrowRight"||e.key==="d")kR=false;
if(e.key==="ArrowDown"||e.key==="s")kB=false;
});

function strt(){ST=1;day=1;goal=200;passed=0;spd=0;plX=0;scroll=0;sc=0;dTmr=0;pPh=0;pLrp=0;ens=[];colT=0;isSn=false;isFg=false;fogA=0;iSn()}
function nxtD(){day++;passed=0;goal=Math.min(200+(day-1)*10,300);dTmr=0;pPh=0;pLrp=0;ens=[];dcT=0;isSn=day%4===3;isFg=day%4===0;if(isSn)iSn();fogA=0;ST=1}
function rst(){ST=0;tBl=0}

var lt=0;
function upd(dt){
fc++;
if(ST===0){tBl+=dt;return}
if(ST===2){dcT+=dt;spd=Math.max(0,spd-200*dt);if(dcT>3)nxtD();return}
if(ST===3){goT+=dt;spd=Math.max(0,spd-200*dt);return}

dTmr+=dt;
var pd=dDur/4;
pPh=Math.floor(dTmr/pd)%4;
pLrp=(dTmr%pd)/pd;

if(dTmr>=dDur){
if(passed>=goal){ST=2;sDayC();return}
else{ST=3;goT=0;sGO();return}
}

var ac2=(tB||kB)?-220:(colT>0)?-350:120;
spd+=ac2*dt;
var em=mxSpd;if(isSn)em=140;if(isFg)em=150;
spd=Math.max(0,Math.min(em,spd));
if(colT>0)colT-=dt;

var st=1.8,sr=0;
if(tL||kL)sr=-st;if(tR||kR)sr=st;
plX+=sr*dt;plX=Math.max(-1.1,Math.min(1.1,plX));
if(Math.abs(plX)>.85)spd=Math.max(0,spd-80*dt);

scroll+=spd*dt;

var sp2=.6+Math.min(day*.1,.8);
if(Math.random()<sp2*dt&&ens.length<12)spwn();

var pZ=5;
for(var i=ens.length-1;i>=0;i--){
var e=ens[i];e.z-=(spd-e.sp)*dt*.15;
if(!e.pd&&e.z<pZ){e.pd=true;passed++;sc+=10;sPass()}
if(e.z<-10||e.z>DD*SL+50){ens.splice(i,1);continue}
if(colT<=0&&e.z>0&&e.z<8){
var pp=proj(pZ),pe=proj(Math.max(e.z,.5));
var psx=pp.x+plX*pp.w*.5,esx=pe.x+e.x*pe.w*.5;
if(Math.abs(psx-esx)<(pp.w*.09+pe.w*.09)*.7&&Math.abs(pp.y-pe.y)<30){
colT=.8;spd=Math.max(0,spd*.2);sCol();if(navigator.vibrate)navigator.vibrate(100);e.z=pZ+10}
}
}
esTmr+=dt;if(esTmr>.1&&spd>5){sEng(spd);esTmr=0}
if(isSn)uSn();
if(isFg)fogA=.3+Math.sin(dTmr*.5)*.1;
}

function rnd(){
var p=gP();

// Sky
var sg=x.createLinearGradient(0,0,0,H*.45);
sg.addColorStop(0,p.s[0]);sg.addColorStop(.5,p.s[1]);sg.addColorStop(1,p.s[2]);
x.fillStyle=sg;x.fillRect(0,0,W,H*.45);

// Mountains
var hY=H*.45;
x.fillStyle=p.m;x.beginPath();x.moveTo(0,hY);
for(var i=0;i<=64;i++)x.lineTo((i/64)*W,hY-mp[i]*60);
x.lineTo(W,hY);x.closePath();x.fill();

x.fillStyle=p.ms;x.beginPath();x.moveTo(0,hY);
for(var i=0;i<=64;i++){var mx=(i/64)*W;if(mp[i]>.5)x.lineTo(mx,hY-mp[i]*60);else x.lineTo(mx,hY)}
x.lineTo(W,hY);x.closePath();x.fill();

// Road
var so=(scroll/SL)%1;
for(var n=DD;n>0;n--){
var z1=(n+so)*SL,z2=(n-1+so)*SL,p1=proj(z1),p2=proj(z2);
if(p2.y<hY-2)continue;
var si=Math.floor(scroll/SL)+n;
x.fillStyle=si%4<2?p.g[0]:p.g[1];x.fillRect(0,p2.y,W,p1.y-p2.y+1);
x.fillStyle=si%4<2?p.r:p.rl;
var a1=p1.x-p1.w*.5,a2=p1.x+p1.w*.5,b1=p2.x-p2.w*.5,b2=p2.x+p2.w*.5;
x.beginPath();x.moveTo(a1,p1.y);x.lineTo(a2,p1.y);x.lineTo(b2,p2.y);x.lineTo(b1,p2.y);x.closePath();x.fill();
if(si%6<3){x.fillStyle=p.st;var w1=p1.w*.008,w2=p2.w*.008;x.beginPath();x.moveTo(p1.x-w1,p1.y);x.lineTo(p1.x+w1,p1.y);x.lineTo(p2.x+w2,p2.y);x.lineTo(p2.x-w2,p2.y);x.closePath();x.fill()}
x.fillStyle=p.st;var e1=p1.w*.006,e2=p2.w*.006;
x.beginPath();x.moveTo(a1-e1,p1.y);x.lineTo(a1+e1,p1.y);x.lineTo(b1+e2,p2.y);x.lineTo(b1-e2,p2.y);x.closePath();x.fill();
x.beginPath();x.moveTo(a2-e1,p1.y);x.lineTo(a2+e1,p1.y);x.lineTo(b2+e2,p2.y);x.lineTo(b2-e2,p2.y);x.closePath();x.fill();
}

// Enemies
var se=[];for(var i=0;i<ens.length;i++)if(ens[i].z>.5)se.push(ens[i]);
se.sort(function(a,b){return b.z-a.z});
for(var i=0;i<se.length;i++){var e=se[i],ep=proj(e.z),ex2=ep.x+e.x*ep.w*.5,ey2=ep.y,ew2=ep.w*.09;if(ew2<1||ey2<hY-10||ey2>H)continue;dEC(ex2,ey2,ew2,e.ci,p)}

// Player
if(ST>=1){
var pp=proj(5),px2=pp.x+plX*pp.w*.5,py2=H*.88;
if(colT>0&&((colT*10|0)%2===0))x.globalAlpha=.5;
dPC(px2,py2,pp.w);x.globalAlpha=1}

if(isSn)dSn();
if(isFg&&fogA>0){x.fillStyle="rgba(180,180,180,"+fogA.toFixed(2)+")";x.fillRect(0,H*.3,W,H*.7)}

// HUD
if(ST===1||ST===2){
x.font="bold 11px monospace";x.textAlign="left";
x.fillStyle="rgba(0,0,0,.5)";x.fillRect(10,14,70,8);
var sp=spd/mxSpd;x.fillStyle=sp>.7?"#f44":sp>.4?"#fa2":"#4c4";
x.fillRect(10,14,70*sp,8);
x.fillStyle=p.t;x.fillText((spd|0)+" km/h",10,34);
x.textAlign="right";x.fillText("DIA "+day,W-10,14);x.fillText(passed+" / "+goal,W-10,28);
var tl=Math.max(0,dDur-dTmr),mn=tl/60|0,ss=tl%60|0;
x.textAlign="center";x.fillText(mn+":"+(ss<10?"0":"")+ss,W/2,14);
x.fillText("SCORE: "+sc,W/2,28);
if(isSn)x.fillText("* NEVE *",W/2,42);
if(isFg)x.fillText("~ NEBLINA ~",W/2,42);
x.fillStyle="rgba(255,255,255,.12)";x.fillRect(0,H*.82,W,H*.18);
x.fillStyle="rgba(255,255,255,.2)";x.font="9px monospace";x.textAlign="center";x.fillText("FREIO",W/2,H*.95);
x.fillStyle="rgba(255,255,255,.08)";x.fillRect(0,H*.45,W*.15,H*.37);x.fillRect(W*.85,H*.45,W*.15,H*.37);
x.fillStyle="rgba(255,255,255,.15)";x.font="16px monospace";x.fillText("\u25C0",W*.075,H*.65);x.fillText("\u25B6",W*.925,H*.65);
}

// Title
if(ST===0){
x.fillStyle="rgba(0,0,0,.75)";x.fillRect(0,0,W,H);
x.fillStyle="#fc0";x.font="bold 36px monospace";x.textAlign="center";
x.fillText("ENDURO",W/2,H*.25);
x.fillStyle="#f84";x.font="11px monospace";x.fillText("ATARI CLASSIC TRIBUTE",W/2,H*.31);
dPC(W/2,H*.46,350);
x.fillStyle="#ccc";x.font="11px monospace";
x.fillText("ULTRAPASSE OS CARROS",W/2,H*.61);
x.fillText("ANTES DO TEMPO ACABAR!",W/2,H*.65);
x.font="10px monospace";x.fillStyle="#888";
x.fillText("TOQUE ESQUERDA/DIREITA = MOVER",W/2,H*.72);
x.fillText("TOQUE EMBAIXO = FREIO",W/2,H*.76);
if((tBl*2|0)%2===0){x.fillStyle="#fff";x.font="bold 14px monospace";x.fillText("TOQUE PARA JOGAR",W/2,H*.87)}
}

// Day Complete
if(ST===2){
x.fillStyle="rgba(0,0,0,.6)";x.fillRect(0,H*.3,W,H*.3);
x.fillStyle="#fc0";x.font="bold 20px monospace";x.textAlign="center";
x.fillText("DIA "+day+" COMPLETO!",W/2,H*.42);
x.fillStyle="#fff";x.font="13px monospace";
x.fillText(passed+" ULTRAPASSADOS",W/2,H*.50);
x.fillText("SCORE: "+sc,W/2,H*.55);
}

// Game Over
if(ST===3){
x.fillStyle="rgba(0,0,0,.7)";x.fillRect(0,H*.25,W,H*.4);
x.fillStyle="#f44";x.font="bold 24px monospace";x.textAlign="center";
x.fillText("GAME OVER",W/2,H*.37);
x.fillStyle="#fff";x.font="12px monospace";
x.fillText("DIA "+day,W/2,H*.44);
x.fillText(passed+" / "+goal+" CARROS",W/2,H*.49);
x.fillText("SCORE: "+sc,W/2,H*.54);
if(goT>2&&((goT*2|0)%2===0)){x.fillStyle="#ccc";x.fillText("TOQUE PARA RECOMECAR",W/2,H*.61)}
}
}

function loop(ts){
var dt=Math.min((ts-lt)/1000,.05);lt=ts;
upd(dt);rnd();
requestAnimationFrame(loop)
}
lt=performance.now();
requestAnimationFrame(loop);
</script>
</body>
</html>
